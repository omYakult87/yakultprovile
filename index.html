<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>VD Webploy</title>

<!-- GOOGLE ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7247928249803767"
     crossorigin="anonymous"></script>

<style>
body{
  background:#0b0b0f;
  color:white;
  font-family:monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.box{
  width:380px;
  padding:30px;
  border-radius:14px;
  background:#111;
  border:2px solid;
  border-image: linear-gradient(45deg,#ff0000,#ffff00,#00ff88,#8b5cf6) 1;
  text-align:center;
}
.logo{
  font-size:40px;
  font-weight:bold;
  border:2px solid;
  border-image: linear-gradient(45deg,#ff0000,#ffff00,#00ff88,#8b5cf6) 1;
  display:inline-block;
  padding:8px 16px;
  margin-bottom:5px;
}
.logo span{
  font-size:14px;
  display:block;
  color:white;
}
input[type=file], input[type=text]{
  margin-top:10px;
  padding:10px;
  width:100%;
  background:black;
  border:1px solid #333;
  color:white;
}
button{
  margin-top:15px;
  padding:10px;
  width:100%;
  background:black;
  color:white;
  border:2px solid;
  border-image: linear-gradient(45deg,#ff0000,#ffff00,#00ff88,#8b5cf6) 1;
  cursor:pointer;
}
#link{
  margin-top:15px;
  color:#00ff88;
  word-break:break-all;
  font-size:14px;
}
#limitDisplay{
  margin-top:8px;
  font-size:14px;
  color:#ccc;
}
/* POPUP */
#popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}
.popupBox{
  background:#111;
  padding:25px;
  border-radius:10px;
  border:2px solid #ff4d4d;
  text-align:center;
  width:300px;
}
.popupBox button{
  width:80%;
  margin-top:10px;
}
.api-info{
  font-size:12px;
  color:#ccc;
  margin-top:5px;
}
.api-info a{
  color:#0ff;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="box">

<div class="logo">
VD
<span>webploy</span>
</div>

<p>Masukan API key untuk mendapatkan akses penuh</p>
<input type="text" id="apikey" placeholder="API Key">
<p class="api-info">
Kamu belum punya API key? <a href="https://yaakultxd.vercel.app/" target="_blank">Klik di sini</a>
</p>

<input type="file" id="file">
<button onclick="deploy()">Deploy</button>
<p id="limitDisplay">Sisa limit: 3</p>

<p id="link"></p>

<!-- Slot AdSense -->
<div style="margin-top:20px">
<!-- Taruh kode Ads disini -->
</div>

</div>

<!-- POPUP HTML -->
<div id="popup">
  <div class="popupBox">
    <h3 id="popupTitle">Info</h3>
    <p id="popupText"></p>
    <button id="watchAdBtn" onclick="watchAd()">Tonton Iklan</button>
    <button onclick="closePopup()">Tutup</button>
    <img id="popupImg" src="qrpay.png" width="200" style="display:none;margin-top:10px">
</div>
</div>

<script>
let limitKey = "vd_limit";
let limit = parseInt(localStorage.getItem(limitKey)) || 0;
const maxLimit = 3;

updateLimitDisplay();

function deploy(){
  const token = document.getElementById("apikey").value.trim();
  const file = document.getElementById("file").files[0];

  // Validasi API key
  if(!token){
    showPopup("API Key kosong","Masukkan API key dulu");
    return;
  }

  // Validasi file
  if(!file){
    showPopup("File kosong","Upload file HTML dulu");
    return;
  }
  if(!file.name.endsWith(".html")){
    showPopup("File salah","File harus berekstensi .html");
    return;
  }

  if(limit >= maxLimit){
    showPopup("Limit habis","Waduh, limit deploy kamu habis. Klik 'Tonton Iklan' di popup untuk menambah limit.");
    return;
  }

  // Deploy berhasil
  limit++;
  localStorage.setItem(limitKey,limit);
  updateLimitDisplay();

  const url = "https://deploy-"+Math.random().toString(36).substring(7)+".vercel.app";
  document.getElementById("link").innerHTML = 'Link deploy : <a href="'+url+'" target="_blank">'+url+'</a>';
}

// Update tampilan limit
function updateLimitDisplay(){
  const remaining = maxLimit - limit;
  document.getElementById("limitDisplay").innerText = "Sisa limit: "+remaining;
}

// Popup functions
function showPopup(title,text,img=false){
  document.getElementById("popupTitle").innerText = title;
  document.getElementById("popupText").innerText = text;
  if(img){
    document.getElementById("popupImg").style.display="block";
  }else{
    document.getElementById("popupImg").style.display="none";
  }
  document.getElementById("popup").style.display="flex";
}
function closePopup(){
  document.getElementById("popup").style.display="none";
}

// Watch Ads -> tambah 1 limit
function watchAd(){
  if(limit < maxLimit){
    limit++;
    localStorage.setItem(limitKey,limit);
    updateLimitDisplay();
    showPopup("Limit bertambah","Kamu menonton iklan, limit deploy bertambah 1");
  } else {
    showPopup("Limit penuh","Limit deploy kamu sudah penuh");
  }
}
</script>

</body>
  </html>
